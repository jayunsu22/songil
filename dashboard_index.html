<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1분견적 파트너스 대시보드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
    <script>
        // 만약 이미 로컬스토리지에 인증 토큰이 있다면 바로 대시보드로 리다이렉트
        if (localStorage.getItem('partner_id')) {
            window.location.href = 'com_film_dashboard.html';
        }
    </script>
</head>
<body>
    <div class="login-container">
        <div class="glass-panel" style="text-align: center;">
            <div class="brand-header">
                <div class="logo-icon">🔒</div>
                <h1 style="color: var(--accent);">접근 안내</h1>
            </div>
            
            <p style="color: var(--text-main); font-size: 16px; line-height: 1.6; margin-bottom: 24px;">
                이곳은 1분견적 공식 파트너 전용 공간입니다.<br><br>
                카카오톡이나 문자로 전달받으신<br>
                <strong style="color: var(--accent);">'전용 고유 링크(URL)'</strong>를 통해서만<br>
                대시보드에 접속하실 수 있습니다.
            </p>

            <div style="background: rgba(217, 92, 60, 0.05); border: 1px solid rgba(217, 92, 60, 0.2); padding: 15px; border-radius: 12px; margin-bottom: 10px;">
                <p style="color: var(--accent); font-size: 13px; font-weight: bold;">
                    링크를 잃어버리셨다면,<br>담당자에게 링크 재발급을 요청해주세요.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
